services:

  postgres:
    image: pgvector/pgvector:pg17
    environment:
      POSTGRES_DB: aus_underwriting
      POSTGRES_USER: qbe
      POSTGRES_PASSWORD: localdev
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U qbe -d aus_underwriting"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build: .
    ports:
      - "8000:8000"
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://qbe:localdev@postgres:5432/aus_underwriting
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - .:/app
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload

  dashboard:
    build: .
    ports:
      - "8501:8501"
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://qbe:localdev@postgres:5432/aus_underwriting
    depends_on:
      postgres:
        condition: service_healthy
    command: streamlit run platform/cost-tracking/dashboard.py --server.port 8501

volumes:
  postgres_data:
