apiVersion: v1
kind: Service
metadata:
  name: insureai-dashboard
  namespace: insureai
spec:
  type: LoadBalancer
  selector:
    app: insureai-dashboard
  ports:
  - protocol: TCP
    port: 80
    targetPort: 8501
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: insureai-dashboard
  namespace: insureai
spec:
  replicas: 1
  selector:
    matchLabels:
      app: insureai-dashboard
  template:
    metadata:
      labels:
        app: insureai-dashboard
    spec:
      containers:
      - name: dashboard
        image: 257212470251.dkr.ecr.ap-southeast-2.amazonaws.com/insureai:latest
        command:
        - streamlit
        - run
        - frontend/underwriter_portal.py
        - --server.port=8501
        - --server.address=0.0.0.0
        ports:
        - containerPort: 8501
        env:
        - name: DATABASE_URL
          valueFrom:
            secretKeyRef:
              name: insureai-secrets
              key: DATABASE_URL
        - name: ANTHROPIC_API_KEY
          valueFrom:
            secretKeyRef:
              name: insureai-secrets
              key: ANTHROPIC_API_KEY
        livenessProbe:
          tcpSocket:
            port: 8501
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          tcpSocket:
            port: 8501
          initialDelaySeconds: 10
          periodSeconds: 5
        resources:
          requests:
            cpu: 100m
            memory: 256Mi
          limits:
            cpu: 200m
            memory: 512Mi
