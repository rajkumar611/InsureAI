apiVersion: v1
kind: Service
metadata:
  name: insureai-api
  namespace: insureai
spec:
  type: LoadBalancer
  selector:
    app: insureai-api
  ports:
  - protocol: TCP
    port: 80
    targetPort: 8081
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: insureai-api
  namespace: insureai
spec:
  replicas: 2
  selector:
    matchLabels:
      app: insureai-api
  template:
    metadata:
      labels:
        app: insureai-api
    spec:
      initContainers:
      - name: migrate
        image: 257212470251.dkr.ecr.ap-southeast-2.amazonaws.com/insureai:latest
        command:
        - sh
        - -c
        - "python -m alembic upgrade head"
        env:
        - name: DATABASE_URL
          valueFrom:
            secretKeyRef:
              name: insureai-secrets
              key: DATABASE_URL
      containers:
      - name: insureai-api
        image: 257212470251.dkr.ecr.ap-southeast-2.amazonaws.com/insureai:latest
        ports:
        - containerPort: 8081
        env:
        - name: ANTHROPIC_API_KEY
          valueFrom:
            secretKeyRef:
              name: insureai-secrets
              key: ANTHROPIC_API_KEY
        - name: DATABASE_URL
          valueFrom:
            secretKeyRef:
              name: insureai-secrets
              key: DATABASE_URL
        - name: FRONTEND_ORIGIN
          valueFrom:
            configMapKeyRef:
              name: insureai-config
              key: FRONTEND_ORIGIN
        - name: LOG_LEVEL
          valueFrom:
            configMapKeyRef:
              name: insureai-config
              key: LOG_LEVEL
        livenessProbe:
          httpGet:
            path: /health
            port: 8081
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /health/ready
            port: 8081
          initialDelaySeconds: 10
          periodSeconds: 5
        resources:
          requests:
            cpu: 250m
            memory: 512Mi
          limits:
            cpu: 500m
            memory: 1Gi
