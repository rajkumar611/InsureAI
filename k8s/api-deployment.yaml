apiVersion: apps/v1
kind: Deployment
metadata:
  name: insureai-api
  namespace: insureai
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: insureai-api
  template:
    metadata:
      labels:
        app: insureai-api
    spec:
      initContainers:
      - name: migrate
        image: insureairegistry.azurecr.io/insureai:latest
        imagePullPolicy: Always
        command: ["alembic", "upgrade", "head"]
        env:
        - name: DATABASE_URL
          valueFrom:
            secretKeyRef:
              name: insureai-secrets
              key: DATABASE_URL
        - name: PYTHONPATH
          value: /app/backend:/app
      containers:
      - name: api
        image: insureairegistry.azurecr.io/insureai:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 8081
          name: http
        env:
        - name: DATABASE_URL
          valueFrom:
            secretKeyRef:
              name: insureai-secrets
              key: DATABASE_URL
        - name: ANTHROPIC_API_KEY
          valueFrom:
            secretKeyRef:
              name: insureai-secrets
              key: ANTHROPIC_API_KEY
        envFrom:
        - configMapRef:
            name: insureai-config
        livenessProbe:
          httpGet:
            path: /health
            port: 8081
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /health/ready
            port: 8081
          initialDelaySeconds: 10
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 2
        resources:
          requests:
            cpu: 250m
            memory: 512Mi
          limits:
            cpu: 500m
            memory: 1Gi
---
apiVersion: v1
kind: Service
metadata:
  name: insureai-api
  namespace: insureai
spec:
  selector:
    app: insureai-api
  ports:
  - port: 80
    targetPort: 8081
    protocol: TCP
  type: LoadBalancer
