apiVersion: v1
kind: Service
metadata:
  name: postgres
  namespace: insureai
spec:
  clusterIP: None
  selector:
    app: postgres
  ports:
  - port: 5432
    targetPort: 5432
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: postgres
  namespace: insureai
spec:
  serviceName: postgres
  replicas: 1
  selector:
    matchLabels:
      app: postgres
  template:
    metadata:
      labels:
        app: postgres
    spec:
      containers:
      - name: postgres
        image: pgvector/pgvector:pg17
        ports:
        - containerPort: 5432
        env:
        - name: POSTGRES_USER
          value: "dbinsureai"
        - name: POSTGRES_PASSWORD
          valueFrom:
            secretKeyRef:
              name: insureai-secrets
              key: POSTGRES_PASSWORD
        - name: POSTGRES_DB
          value: "aus_underwriting"
        livenessProbe:
          exec:
            command:
            - /bin/sh
            - -c
            - pg_isready -U dbinsureai
          initialDelaySeconds: 30
          periodSeconds: 10
        resources:
          requests:
            cpu: 100m
            memory: 256Mi
          limits:
            cpu: 500m
            memory: 1Gi
        volumeMounts:
        - name: postgres-storage
          mountPath: /var/lib/postgresql/data
  volumeClaimTemplates:
  - metadata:
      name: postgres-storage
    spec:
      accessModes: ["ReadWriteOnce"]
      resources:
        requests:
          storage: 10Gi
