# ── Alembic Quick Reference for Developers ────────────────────────────────────
# Database migrations are version-controlled SQL schema changes.
#
# WORKFLOW:
#   1. Modify src/underwriting/database/models.py (add/change columns)
#   2. Run: alembic revision --autogenerate -m "describe your change"
#   3. Review the generated alembic/versions/*.py file
#   4. Run: alembic upgrade head (applies migration to your local DB)
#
# COMMON COMMANDS:
#   alembic upgrade head             → Apply all pending migrations to DB
#   alembic downgrade -1             → Rollback the last applied migration
#   alembic history                  → Show migration history
#   alembic current                  → Show current DB schema version
#   alembic upgrade [revision_id]    → Jump to a specific revision
#
# NEVER manually edit files in alembic/versions/
# Alembic auto-generates them when you run "revision --autogenerate".
#
# For help: https://alembic.sqlalchemy.org/en/latest/

[alembic]
script_location = alembic
file_template = %%(year)d%%(month).2d%%(day).2d_%%(rev)s_%%(slug)s
prepend_sys_path = src
sqlalchemy.url = postgresql+asyncpg://qbe:localdev@localhost:5432/aus_underwriting

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
